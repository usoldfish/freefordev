desc: 图片处理、免费素材、无头 CMS,做内容型产品和媒体号的弹药库。
services:
  - name: Cloudinary
    url: https://cloudinary.com
    desc: 图片/视频云处理老大哥,URL 参数即改尺寸格式,免费层够个人项目。
    free_quota: 25 Credits/月(约 25GB 存储或流量、2 万次转换)
    credit_card: "no"
    china: ok
    indie: 4
    tags: [图片处理, 视频, CDN]
  - name: ImageKit
    url: https://imagekit.io
    desc: 实时图片优化 + CDN,可挂在已有存储(如 R2)前面,接入轻。
    free_quota: 20GB 流量/月、20GB 存储
    credit_card: "no"
    china: ok
    indie: 4
    tags: [图片优化, CDN]
