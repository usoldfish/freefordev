key: ai
name: AI / LLM API
icon: 🤖
order: 12
desc: 大模型 API 的免费额度与免费模型,做 AI 工具产品的核心原料。变动极快,以官网为准。
services:
  - name: Google AI Studio(Gemini API)
    url: https://aistudio.google.com
    desc: Gemini 免费 API 额度业界最大方,快速验证 AI 产品想法首选。
    free_quota: 免费层:Gemini Flash 系列每天上千次请求(按模型不同),含多模态
    credit_card: "no"
    china: blocked
    china_note: 国内无法直连,需海外服务器中转
    indie: 5
    tags: [Gemini, 多模态, 免费额度]
  - name: Groq
    url: https://groq.com
    desc: LPU 推理快到飞起,开源模型(Llama 等)免费额度可观,做实时应用体验好。
    free_quota: 免费层:按模型每天数千至数万 token 请求限额
    credit_card: "no"
    china: partial
    indie: 4
    tags: [推理, 开源模型, 高速]
  - name: OpenRouter
    url: https://openrouter.ai
    desc: 一个 API 聚合所有主流模型,常年有多个免费模型可白嫖,切换零成本。
